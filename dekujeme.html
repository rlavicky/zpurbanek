<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Děkujeme za poptávku – Zemní práce Urbánek</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <style>
    :root { --yellow:#f5c100; --yellow-dark:#d4a800; --dark:#1a1a1a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI', Arial, sans-serif;
      background:#1a1a1a;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      text-align:center;
    }
    .card { max-width:520px; }
    .check {
      width:96px; height:96px;
      margin:0 auto 28px;
      background:var(--yellow);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 0 10px rgba(245,193,0,0.15);
    }
    .check svg { width:50px; height:50px; fill:var(--dark); }
    h1 { font-size:clamp(28px,5vw,40px); font-weight:900; text-transform:uppercase; margin-bottom:14px; }
    h1 span { color:var(--yellow); }
    p { color:#bbb; font-size:17px; line-height:1.6; margin-bottom:32px; }
    .btn {
      display:inline-flex; align-items:center; gap:10px;
      background:var(--yellow); color:var(--dark);
      font-weight:800; font-size:16px; text-transform:uppercase; letter-spacing:.5px;
      padding:16px 34px; border-radius:10px; text-decoration:none;
      transition:background .2s, transform .15s;
    }
    .btn:hover { background:var(--yellow-dark); transform:translateY(-2px); }
    .phone { margin-top:24px; color:#888; font-size:15px; }
    .phone a { color:var(--yellow); text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <h1>Děkujeme za <span>poptávku</span></h1>
    <p>Vaše zpráva byla odeslána. Ozveme se vám co nejdříve s nezávaznou nabídkou.</p>
    <a href="index.html" class="btn">← Zpět na web</a>
    <div class="phone">Spěchá to? Zavolejte nám: <a href="tel:+420777310268">+420 777 310 268</a></div>
  </div>
</body>
</html>
